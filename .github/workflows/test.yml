name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (informational until existing issues are fixed)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        env:
          AUTH_SECRET: ci-auth-secret-placeholder-32-characters
          ADMIN_EMAIL: admin@example.com
          AUTH_GOOGLE_ID: ci-google-client-id
          AUTH_GOOGLE_SECRET: ci-google-client-secret
          RESEND_API_KEY: re_ci_placeholder
          SELLER_EMAIL: seller@example.com
          ORDER_EMAIL_FROM: "Wiko Spellbook CI <orders@example.com>"
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npm run build
